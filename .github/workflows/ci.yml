name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'LICENSE'

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore usb-event/usb-event.csproj -r win-x64

      - name: Build
        run: dotnet build usb-event/usb-event.csproj --no-restore -c Release

      - name: Publish (portable)
        run: >
          dotnet publish usb-event/usb-event.csproj
          --no-restore
          -c Release
          -r win-x64
          --no-self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
